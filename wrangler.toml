name = "antiscambottool"
main = "src/index.ts"
compatibility_flags = [ "nodejs_compat" ]
compatibility_date = "2025-11-25"
send_metrics = false
minify = true
upload_source_maps = true
preview_urls = false
workers_dev = false

services = [
  { binding = "API_SERVICE", service = "antiscamapi", entrypoint = "APILookup" },
  { binding = "REPORT", service="antiscamreport", entrypoint="ScamReportBridge" },
]

routes = [
  { pattern = "tool.scamguard.app", custom_domain = true },
]

kv_namespaces = [
  { binding="FORBID_LIST", id="fef7637f60014232bcab3794aa530db3"},
  { binding="CAN_REPORT", id="65a8b172d3014e11960367d0f4c8d480"},
  { binding="REPORT_THREAD_CHAIN", id="6acf800bb3fa47f88eb9d296a0808668" },
]

[observability]
[observability.logs]
enabled = true
head_sampling_rate = 1
[observability.traces]
enabled = true
head_sampling_rate = 0.5

# flags required to run wrangler in linux
[dev]
ip = "127.0.0.1"

[placement]
mode = "smart"

[triggers]
crons = ["0 3 * * 2"]

[vars]
# Your CF Account ID, found here: https://developers.cloudflare.com/fundamentals/account/find-account-and-zone-ids/
CF_ACCOUNT_ID="c56f01b66d3ce2234fb0012a345aa1c6"
# The binding for REPORT_THREAD_CHAIN above. Used for bulk deletion of old records
THREAD_CHAIN_KV_ID="6acf800bb3fa47f88eb9d296a0808668"
